# Pre-commit hooks for Terraform modules
# Install: pip install pre-commit
# Setup: pre-commit install
# Run: pre-commit run --all-files

repos:
  # Terraform formatting and validation
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.83.5
    hooks:
      - id: terraform_fmt
        name: Terraform format
        description: Rewrites Terraform files to canonical format
        
      - id: terraform_validate
        name: Terraform validate
        description: Validates Terraform configuration files
        
      - id: terraform_docs
        name: Terraform docs
        description: Generates documentation from Terraform modules
        args:
          - --hook-config=--path-to-file=README.md
          - --hook-config=--add-to-existing-file=true
          - --hook-config=--create-file-if-not-exist=true
          
      - id: terraform_tflint
        name: TFLint
        description: Lints Terraform files
        args:
          - --args=--config=__GIT_WORKING_DIR__/.tflint.hcl
          
      - id: terraform_checkov
        name: Checkov
        description: Runs Checkov security scanning
        args:
          - --args=--config-file=__GIT_WORKING_DIR__/.checkov.yaml

  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        name: Trim trailing whitespace
        
      - id: end-of-file-fixer
        name: Fix end of files
        
      - id: check-yaml
        name: Check YAML syntax
        
      - id: check-added-large-files
        name: Check for large files
        args: ['--maxkb=1000']
        
      - id: check-merge-conflict
        name: Check for merge conflicts
        
      - id: detect-private-key
        name: Detect private keys

  # Markdown linting
  - repo: https://github.com/markdownlint/markdownlint
    rev: v0.12.0
    hooks:
      - id: markdownlint
        name: Markdown lint
        args: ['--rules', '~MD013,~MD033,~MD041']
